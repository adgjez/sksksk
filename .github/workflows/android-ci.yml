name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Build debug APK (appMax)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Cronet native libs are downloaded by the build script.
      # Network may be flaky in CI; this step is best-effort.
      - name: Download Cronet (best-effort)
        continue-on-error: true
        run: ./gradlew app:downloadCronet --no-daemon

      - name: Build appMax debug APK
        run: ./gradlew :app:assembleAppMaxDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: appMax-debug-apk
          path: |
            app/build/outputs/apk/appMax/debug/*.apk
            app/build/outputs/apk/appMax/debug/*.json
          if-no-files-found: warn
          retention-days: 7

  build-other-flavors:
    name: Build other flavors (appS / appLegacy)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build-debug
    strategy:
      fail-fast: false
      matrix:
        flavor: [appSDebug, appLegacyDebug]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build ${{ matrix.flavor }}
        run: ./gradlew :app:assemble${{ matrix.flavor }} --no-daemon --stacktrace
